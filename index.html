<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3 Meal's Food Cart</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  overflow-x: hidden;
}

/* WELCOME SCREEN */
#welcome {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: linear-gradient(135deg, #ff6a00, #ee0979);
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  font-size: 40px;
  font-weight: bold;
  animation: fadeOut 1s ease 3s forwards;
}

@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

/* MAIN */
#main {
  display: none;
  padding: 20px;
  text-align: center;
}

h1 {
  color: white;
  text-shadow: 2px 2px 5px black;
}

/* MENU */
.menu {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
}

.item {
  background: white;
  padding: 10px;
  border-radius: 15px;
}

button {
  padding: 8px;
  border: none;
  background: #ff4081;
  color: white;
  border-radius: 10px;
  cursor: pointer;
}

/* CART */
#cart {
  margin-top: 20px;
  background: white;
  padding: 10px;
  border-radius: 15px;
}

.qr {
  margin-top: 10px;
  width: 150px;
}
</style>

</head>

<body>

<!-- WELCOME -->
<div id="welcome">Welcome to 3 Meal's</div>

<!-- MAIN -->
<div id="main">

<h1>Menu</h1>

<div class="menu">
  <div class="item">
    <h3>Burger</h3>
    <p>₱50</p>
    <button onclick="addToCart('Burger',50)">Add</button>
  </div>

  <div class="item">
    <h3>Fries</h3>
    <p>₱30</p>
    <button onclick="addToCart('Fries',30)">Add</button>
  </div>

  <div class="item">
    <h3>Hotdog</h3>
    <p>₱40</p>
    <button onclick="addToCart('Hotdog',40)">Add</button>
  </div>

  <div class="item">
    <h3>Drinks</h3>
    <p>₱20</p>
    <button onclick="addToCart('Drinks',20)">Add</button>
  </div>
</div>

<!-- CART -->
<div id="cart">
  <h2>Cart</h2>
  <ul id="cartList"></ul>
  <h3>Total: ₱<span id="total">0</span></h3>
  <h3>Delivery Fee: ₱10</h3>
  <h2>Final: ₱<span id="final">10</span></h2>

  <button onclick="checkout()">Checkout</button>

  <div id="payment" style="display:none;">
    <h3>Scan to Pay (GCash)</h3>
    <img src="gcash.png" class="qr">
  </div>
</div>

</div>

<script>
let total = 0;

function addToCart(name, price) {
  let li = document.createElement("li");
  li.textContent = name + " - ₱" + price;
  document.getElementById("cartList").appendChild(li);

  total += price;
  document.getElementById("total").textContent = total;
  document.getElementById("final").textContent = total + 10;
}

function checkout() {
  document.getElementById("payment").style.display = "block";
}

/* AUTO SHOW MENU AFTER 3 SEC */
setTimeout(() => {
  document.getElementById("main").style.display = "block";
}, 3000);
</script>

</body>
</html>
