<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3 Meals Food Cart</title>

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #ff7eb3, #65d6ce);
  color: white;
  text-align: center;
}

/* WELCOME */
.header {
  padding: 30px;
  animation: fadeDown 1s ease;
}

@keyframes fadeDown {
  from {opacity: 0; transform: translateY(-20px);}
  to {opacity: 1; transform: translateY(0);}
}

h1 {
  font-size: 42px;
  margin: 0;
}

.quote {
  font-size: 18px;
  opacity: 0.9;
}

/* CARD */
.card {
  background: white;
  color: black;
  margin: 15px auto;
  padding: 20px;
  border-radius: 25px;
  max-width: 420px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  animation: pop 0.5s ease;
}

@keyframes pop {
  from {transform: scale(0.9); opacity: 0;}
  to {transform: scale(1); opacity: 1;}
}

/* MENU */
.item {
  margin-bottom: 15px;
}

.qty {
  display: flex;
  justify-content: center;
  align-items: center;
}

.qty button {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: none;
  background: #ff5e62;
  color: white;
  font-size: 18px;
}

.qty span {
  margin: 0 10px;
  font-size: 20px;
}

/* BUTTON */
button.main {
  padding: 12px 18px;
  border: none;
  border-radius: 20px;
  background: #ff5e62;
  color: white;
  font-size: 16px;
  margin-top: 10px;
}

button.main:hover {
  transform: scale(1.1);
}

/* INPUT */
input {
  width: 90%;
  padding: 12px;
  margin: 5px;
  border-radius: 10px;
  border: 1px solid #ccc;
}
</style>
</head>

<body>

<!-- WELCOME -->
<div class="header">
  <h1>🍱 Welcome to 3 Meal's Food Cart</h1>
  <p class="quote">"Good food. Fast service. Happy customers."</p>
</div>

<!-- QR -->
<div class="card">
  <h2>Scan to Order</h2>
  <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=YOUR_WEBSITE_LINK">
</div>

<!-- MENU -->
<div class="card">
  <h2>Menu</h2>

  <div class="item">
    <p>Lumpiang Shanghai Rice - ₱60</p>
    <div class="qty">
      <button onclick="change('lumpia',-1)">-</button>
      <span id="lumpia">0</span>
      <button onclick="change('lumpia',1)">+</button>
    </div>
  </div>

  <div class="item">
    <p>Chicken Pastil Rice - ₱70</p>
    <div class="qty">
      <button onclick="change('pastil',-1)">-</button>
      <span id="pastil">0</span>
      <button onclick="change('pastil',1)">+</button>
    </div>
  </div>

  <div class="item">
    <p>Siomai Rice - ₱50</p>
    <div class="qty">
      <button onclick="change('siomai',-1)">-</button>
      <span id="siomai">0</span>
      <button onclick="change('siomai',1)">+</button>
    </div>
  </div>
</div>

<!-- CHECKOUT -->
<div class="card">
  <h2>Checkout</h2>

  <input id="name" placeholder="Your Name">
  <input id="address" placeholder="Address">
  <input id="number" placeholder="Phone Number">

  <button class="main" onclick="order()">Place Order</button>
</div>

<script>
let prices = { lumpia:60, pastil:70, siomai:50 };
let qty = { lumpia:0, pastil:0, siomai:0 };

function change(item, val){
  qty[item] += val;
  if(qty[item] < 0) qty[item] = 0;
  document.getElementById(item).innerText = qty[item];
}

function order(){
  let name = document.getElementById("name").value;
  let address = document.getElementById("address").value;
  let number = document.getElementById("number").value;

  let total = 0;
  let items = [];

  for(let i in qty){
    if(qty[i] > 0){
      items.push(i + " x" + qty[i]);
      total += qty[i] * prices[i];
    }
  }

  if(items.length === 0){
    alert("No order!");
    return;
  }

  let msg =
  "ORDER\n" +
  "Name: " + name + "\n" +
  "Address: " + address + "\n" +
  "Phone: " + number + "\n" +
  "Items: " + items.join(", ") + "\n" +
  "Total: ₱" + total;

  let sms = "sms:09525766589?body=" + encodeURIComponent(msg);
  window.open(sms);

  alert("Order ready to send!");
}
</script>

</body>
</html>
