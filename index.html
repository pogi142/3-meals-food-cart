<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Food Cart Order</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  text-align: center;
  color: #333;
}

.container {
  margin: 20px;
  padding: 20px;
  background: white;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  background: #ff5e62;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #ff2e35;
}

.hidden {
  display: none;
}

img {
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>🍔 3 Meals Food Cart</h1>

<div class="container">
  <h2>Step 1: Pay First</h2>
  <p>Scan the QR below and send payment</p>

  <img src="gcash.png" width="200"><br><br>

  <input type="file" id="proof">
  <p>Upload your payment screenshot</p>

  <button onclick="verifyPayment()">I Paid</button>
</div>

<div class="container hidden" id="orderSection">
  <h2>Step 2: Place Order</h2>

  <input type="text" id="name" placeholder="Your Name"><br><br>
  <input type="text" id="order" placeholder="Your Order"><br><br>

  <button onclick="submitOrder()">Submit Order</button>
</div>

<script>
function verifyPayment() {
  let file = document.getElementById("proof").files[0];

  if (!file) {
    alert("Please upload payment proof first!");
    return;
  }

  alert("Payment received! You can now order.");
  document.getElementById("orderSection").classList.remove("hidden");
}

function submitOrder() {
  let name = document.getElementById("name").value;
  let order = document.getElementById("order").value;

  if (name === "" || order === "") {
    alert("Please fill in all fields!");
    return;
  }

  alert("Order sent! Please wait for confirmation.");

  // OPTIONAL: Play sound
  let audio = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
  audio.play();
}
</script>

</body>
</html>
