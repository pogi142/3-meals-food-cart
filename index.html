<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3 Meal's Food Cart</title>

<style>
body {
  margin: 0;
  font-family: Poppins;
  background: linear-gradient(135deg,#d9a7c7,#fffcdc);
}

/* Welcome */
#welcome {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}
#welcome h1 {
  font-size:40px;
}
button {
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#ff6f61;
  color:white;
}

/* Main */
#main { display:none; padding:15px; }

.card {
  background:white;
  padding:10px;
  border-radius:20px;
  margin:10px 0;
}

/* Cart */
#cartBox {
  background:white;
  padding:15px;
  border-radius:20px;
  margin-top:20px;
}
input, select {
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

/* QR */
#qrModal {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
}
#qrBox {
  background:white;
  padding:20px;
  border-radius:20px;
  text-align:center;
}
</style>
</head>

<body>

<!-- WELCOME -->
<div id="welcome">
  <h1>🍔 3 Meal's Food Cart</h1>
  <p>"Good food, good mood!"</p>
  <button onclick="start()">Start Order</button>
</div>

<!-- MAIN -->
<div id="main">

<h2>Menu</h2>
<div id="menu"></div>

<div id="cartBox">
<h3>Cart</h3>
<p id="cartItems"></p>
<p><b>Total: ₱<span id="total">0</span></b></p>

<h3>Customer Info</h3>
<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Address">

<select id="delivery">
  <option value="0">Pick Up</option>
  <option value="10">Delivery (+₱10)</option>
</select>

<select id="payment">
  <option>GCash</option>
</select>

<button onclick="checkout()">Order Now</button>
</div>

</div>

<!-- QR -->
<div id="qrModal">
  <div id="qrBox">
    <h3>Pay First (GCash)</h3>
    <img src="gcash.png" width="200"><br><br>
    <button onclick="paid()">I Paid</button>
  </div>
</div>

<script>

/* PRODUCTS + INVENTORY */
const products = [
  {name:"Lumpiang Shanghai", price:50, stock:10},
  {name:"Rice", price:20, stock:20},
  {name:"Chicken Pastil", price:60, stock:10},
  {name:"Siomai Rice", price:70, stock:10}
];

let cart = [];
let total = 0;
let timer;

/* START */
function start(){
  document.getElementById("welcome").style.display="none";
  document.getElementById("main").style.display="block";
  loadMenu();
}

/* LOAD MENU */
function loadMenu(){
  let menu = document.getElementById("menu");
  menu.innerHTML = "";

  products.forEach((p,i)=>{
    menu.innerHTML += `
      <div class="card">
        <h3>${p.name}</h3>
        <p>₱${p.price}</p>
        <p>Stock: ${p.stock}</p>
        <button onclick="add(${i})">Add</button>
      </div>
    `;
  });
}

/* ADD TO CART */
function add(i){
  if(products[i].stock <= 0){
    alert("Out of stock!");
    return;
  }

  cart.push(products[i]);
  total += products[i].price;
  products[i].stock--;

  updateCart();
  loadMenu();
}

/* UPDATE CART */
function updateCart(){
  document.getElementById("total").innerText = total;
  document.getElementById("cartItems").innerText =
    cart.map(c=>c.name).join(", ");
}

/* CHECKOUT */
function checkout(){
  if(cart.length==0){
    alert("Add items first!");
    return;
  }

  document.getElementById("qrModal").style.display="flex";

  timer = setTimeout(()=>{
    cart = [];
    total = 0;
    alert("Order cancelled (not paid)");
    location.reload();
  }, 120000); // 2 mins
}

/* PAID */
function paid(){
  clearTimeout(timer);

  let deliveryFee = Number(document.getElementById("delivery").value);
  let finalTotal = total + deliveryFee;

  alert(
    "ORDER RECEIVED!\n\n" +
    "Name: " + name.value + "\n" +
    "Phone: " + phone.value + "\n" +
    "Address: " + address.value + "\n" +
    "Items: " + cart.map(c=>c.name).join(", ") + "\n" +
    "Total: ₱" + finalTotal
  );

  cart = [];
  total = 0;
  location.reload();
}

</script>

</body>
</html>
