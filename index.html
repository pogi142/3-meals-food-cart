<!DOCTYPE html>
<html>
<head>
<title>3 Meal's Food Cart</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  background: #0f0f0f;
  color: white;
}

/* BUBBLE HEADER */
header {
  text-align: center;
  padding: 20px;
  background: linear-gradient(135deg, #ff4d6d, #ffbe0b);
  border-bottom-left-radius: 30px;
  border-bottom-right-radius: 30px;
}

h1 {
  font-size: 28px;
  background: white;
  color: black;
  display: inline-block;
  padding: 10px 20px;
  border-radius: 50px; /* BUBBLE TEXT */
}

/* SEARCH */
.search-box {
  padding: 15px;
  text-align: center;
}

.search-box input {
  width: 80%;
  padding: 12px;
  border-radius: 50px;
  border: none;
  font-size: 16px;
}

/* MENU */
.menu {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
  padding: 20px;
}

/* FOOD CARD */
.item {
  background: #1a1a1a;
  padding: 15px;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 5px 15px rgba(255,0,0,0.2);
  transition: 0.3s;
}

.item:hover {
  transform: scale(1.05);
}

.item h2 {
  color: #ffbe0b;
}

/* BUTTON */
button {
  background: linear-gradient(135deg, #ff4d6d, #ffbe0b);
  border: none;
  padding: 10px;
  border-radius: 50px;
  color: black;
  font-weight: bold;
  width: 100%;
  margin-top: 10px;
}

/* CART */
.cart {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #000;
  padding: 15px;
  border-top-left-radius: 20px;
  border-top-right-radius: 20px;
}

/* INPUT */
input {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 10px;
  border: none;
}

/* QR */
.qr {
  width: 100px;
  display: block;
  margin: auto;
}
</style>

</head>

<body>

<header>
  <h1>🍽️ 3 Meal's Food Cart</h1>
</header>

<div class="search-box">
  <input type="text" id="search" placeholder="Search food..." onkeyup="searchFood()">
</div>

<div class="menu">

  <div class="item" data-name="lumpia">
    <h2>Lumpiang Shanghai Rice</h2>
    <p>₱120</p>
    <button onclick="addToCart('Lumpiang Shanghai',120)">Add</button>
  </div>

  <div class="item" data-name="pastil">
    <h2>Chicken Pastil Rice</h2>
    <p>₱120</p>
    <button onclick="addToCart('Chicken Pastil',120)">Add</button>
  </div>

  <div class="item" data-name="siomai">
    <h2>Siomai Rice</h2>
    <p>₱100</p>
    <button onclick="addToCart('Siomai',100)">Add</button>
  </div>

</div>

<!-- CART -->
<div class="cart">
  <div id="cartItems"></div>
  <h3>Total: ₱<span id="total">0</span></h3>

  <input type="text" id="name" placeholder="Your Name">
  <input type="text" id="address" placeholder="Your Address">

  <img src="gcash.png" class="qr">
  <p style="text-align:center;">GCash: 09359335066</p>

  <button onclick="checkout()">Checkout</button>
</div>

<script>
let cart = [];

function addToCart(name, price) {
  let item = cart.find(i => i.name === name);

  if(item){
    item.qty++;
  } else {
    cart.push({name, price, qty:1});
  }

  updateCart();
}

function updateCart() {
  let cartDiv = document.getElementById("cartItems");
  let total = 0;
  cartDiv.innerHTML = "";

  cart.forEach(item => {
    total += item.price * item.qty;

    cartDiv.innerHTML += 
      `<p>${item.name} x${item.qty} - ₱${item.price * item.qty}</p>`;
  });

  document.getElementById("total").innerText = total;
}

function checkout() {
  let name = document.getElementById("name").value;
  let address = document.getElementById("address").value;

  if(cart.length === 0 || !name || !address){
    alert("Complete your order!");
    return;
  }

  alert("Order placed! Please send payment via GCash.");
}

function searchFood() {
  let input = document.getElementById("search").value.toLowerCase();
  let items = document.querySelectorAll(".item");

  items.forEach(item => {
    let name = item.getAttribute("data-name");
    item.style.display = name.includes(input) ? "block" : "none";
  });
}
</script>

</body>
</html>
