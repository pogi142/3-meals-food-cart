<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bahay Toro Food Delivery</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #74ebd5, #9face6);
  text-align: center;
}

/* WELCOME */
#welcome {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #66a6ff;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  animation: fadeOut 3s forwards;
  animation-delay: 2s;
  z-index: 999;
}

@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

/* SEARCH */
.search {
  padding: 12px;
  width: 80%;
  max-width: 400px;
  border-radius: 25px;
  border: none;
  margin: 20px;
}

/* PRODUCTS */
.products {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 20px;
  width: 170px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

button {
  background: #66a6ff;
  color: white;
  border: none;
  padding: 8px;
  border-radius: 15px;
}

/* CART */
.cart {
  background: white;
  margin: 20px auto;
  padding: 20px;
  border-radius: 20px;
  width: 90%;
  max-width: 400px;
}

/* ORDER FORM */
input {
  width: 90%;
  padding: 10px;
  margin: 5px;
  border-radius: 15px;
  border: 1px solid #ccc;
}

/* POPUP */
#popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  background: white;
  padding: 25px;
  border-radius: 20px;
  z-index: 1000;
  transition: 0.3s;
}

#popup.show {
  transform: translate(-50%, -50%) scale(1);
}

/* BUBBLES */
.bubble {
  position: fixed;
  bottom: -50px;
  background: rgba(255,255,255,0.3);
  border-radius: 50%;
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  to { transform: translateY(-100vh); }
}
</style>
</head>

<body>

<!-- WELCOME -->
<div id="welcome">
  <h1>🍽️ Welcome!</h1>
  <p>Bahay Toro Food Delivery</p>
</div>

<h2>🍔 Order Now</h2>

<input class="search" placeholder="Search food..." onkeyup="searchProduct()">

<div class="products" id="products"></div>

<div class="cart">
  <h3>🛒 Cart</h3>
  <ul id="cart"></ul>
  <b>Total: ₱<span id="total">0</span></b>

  <h3>📦 Your Details</h3>
  <input id="name" placeholder="Name">
  <input id="address" placeholder="Address">
  <input id="phone" placeholder="Phone">

  <button onclick="order()">Place Order</button>

  <h4>💳 GCash</h4>
  <img src="qr.png" width="120">
</div>

<div id="popup">
  <h2>🎉 Order Received!</h2>
  <p id="summary"></p>
</div>

<div id="qrcode"></div>

<script>
let products = [
  {name:"Lumpiang Shanghai Rice", price:60},
  {name:"Chicken Pastil Rice", price:70},
  {name:"Siomai Rice", price:50}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function saveCart() {
  localStorage.setItem("cart", JSON.stringify(cart));
}

function display(list){
  let html="";
  list.forEach((p,i)=>{
    html+=`
    <div class="card">
      <h4>${p.name}</h4>
      <p>₱${p.price}</p>
      <small style="color:green;">Free Delivery - Bahay Toro</small><br>
      <button onclick="add(${i})">Add</button>
    </div>`;
  });
  document.getElementById("products").innerHTML=html;
}

function add(i){
  cart.push(products[i]);
  update();
  saveCart();
}

function update(){
  let html="";
  let total=0;
  cart.forEach((c,index)=>{
    html+=`
    <li>${c.name} ₱${c.price}
    <button onclick="removeItem(${index})">❌</button></li>`;
    total+=c.price;
  });
  document.getElementById("cart").innerHTML=html;
  document.getElementById("total").innerText=total;
}

function removeItem(i){
  cart.splice(i,1);
  update();
  saveCart();
}

function searchProduct(){
  let val=document.querySelector(".search").value.toLowerCase();
  let filtered=products.filter(p=>p.name.toLowerCase().includes(val));
  display(filtered);
}

function order(){
  let name=document.getElementById("name").value;
  let address=document.getElementById("address").value;
  let phone=document.getElementById("phone").value;

  if(!name||!address||!phone||cart.length===0){
    alert("Complete order first!");
    return;
  }

  let text=`Order from ${name}\n${address}\n${phone}\n\n`;
  let total=0;

  cart.forEach(c=>{
    text+=`${c.name} ₱${c.price}\n`;
    total+=c.price;
  });

  text+=`\nTotal: ₱${total}`;

  document.getElementById("summary").innerText=text;
  document.getElementById("popup").classList.add("show");

  // OPEN SMS (CHANGE NUMBER)
  window.location.href = `sms:09359335066?body=${encodeURIComponent(text)}`;

  cart=[];
  saveCart();
  update();
}

// QR WEBSITE
new QRCode(document.getElementById("qrcode"), {
  text: "https://your-site-link.com",
  width: 120,
  height: 120
});

// BUBBLES
for(let i=0;i<20;i++){
  let b=document.createElement("div");
  b.className="bubble";
  b.style.left=Math.random()*100+"vw";
  b.style.width=b.style.height=(20+Math.random()*30)+"px";
  b.style.animationDuration=(5+Math.random()*10)+"s";
  document.body.appendChild(b);
}

display(products);
update();
</script>

</body>
</html>
