<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3 Meal's Food Cart</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #fff5e6;
}

/* HEADER */
header {
    background: #d62828;
    color: white;
    padding: 15px;
    text-align: center;
}

/* SEARCH BAR */
.search {
    padding: 10px;
    text-align: center;
}

.search input {
    width: 80%;
    padding: 10px;
    border-radius: 20px;
    border: 1px solid #ccc;
}

/* MENU */
.menu {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.item {
    background: white;
    margin: 10px;
    padding: 15px;
    border-radius: 10px;
    width: 150px;
    text-align: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    transition: transform 0.3s;
}

.item:hover {
    transform: scale(1.05);
}

button {
    background: #f77f00;
    border: none;
    padding: 8px;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

/* CART */
.cart {
    background: #003049;
    color: white;
    padding: 15px;
}

input, select {
    padding: 8px;
    margin: 5px;
}

/* RECEIPT */
#receipt {
    background: white;
    padding: 10px;
    margin-top: 10px;
    display: none;
}

/* ANIMATION */
.fade {
    animation: fadeIn 1s;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}
</style>
</head>

<body>

<header>
<h1>🍔 3 Meal's Food Cart</h1>
</header>

<!-- SEARCH -->
<div class="search">
<input type="text" id="search" placeholder="Search food..." onkeyup="searchFood()">
</div>

<!-- MENU -->
<div class="menu" id="menu">
<div class="item fade">
<h3>Burger</h3>
<p>₱50</p>
<button onclick="addToCart('Burger',50)">Add</button>
</div>

<div class="item fade">
<h3>Fries</h3>
<p>₱30</p>
<button onclick="addToCart('Fries',30)">Add</button>
</div>

<div class="item fade">
<h3>Hotdog</h3>
<p>₱40</p>
<button onclick="addToCart('Hotdog',40)">Add</button>
</div>
</div>

<!-- CART / CHECKOUT -->
<div class="cart">
<h2>🛒 Cart</h2>

Name: <input type="text" id="name"><br>

<ul id="cartList"></ul>

Total: ₱<span id="total">0</span><br><br>

<button onclick="checkout()">Checkout</button>

<!-- RECEIPT -->
<div id="receipt"></div>

<!-- QR PAYMENT -->
<h3>📱 Pay with GCash</h3>
<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=09525766589">

<h3>🌐 Visit Website</h3>
<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://pogi142.github.io/3-meals-food-cart/">
</div>

<script>
let cart = [];
let total = 0;

function addToCart(name, price) {
    cart.push({name, price});
    total += price;
    updateCart();
}

function updateCart() {
    let list = document.getElementById("cartList");
    list.innerHTML = "";

    cart.forEach(item => {
        let li = document.createElement("li");
        li.textContent = item.name + " - ₱" + item.price;
        list.appendChild(li);
    });

    document.getElementById("total").textContent = total;
}

function checkout() {
    let name = document.getElementById("name").value;

    if(name === "") {
        alert("Enter your name!");
        return;
    }

    let receipt = document.getElementById("receipt");
    receipt.style.display = "block";

    let items = cart.map(i => i.name).join(", ");

    receipt.innerHTML = `
        <h3>🧾 Receipt</h3>
        Name: ${name}<br>
        Items: ${items}<br>
        Total: ₱${total}<br>
        Contact: 09525766589
    `;
}

/* SEARCH FUNCTION */
function searchFood() {
    let input = document.getElementById("search").value.toLowerCase();
    let items = document.querySelectorAll(".item");

    items.forEach(item => {
        let text = item.innerText.toLowerCase();
        item.style.display = text.includes(input) ? "" : "none";
    });
}
</script>

</body>
</html>
