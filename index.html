<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3 Meals Food Cart</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  margin: 0;
}

/* HEADER */
.header {
  background: #111;
  color: white;
  padding: 20px;
  text-align: center;
}

.header h1 {
  margin: 0;
  font-size: 26px;
}

.header p {
  margin: 5px 0 0;
  font-size: 14px;
  color: #ccc;
}

/* PAGE */
.page { display: none; padding: 20px; }
.active { display: block; }

/* CARD */
.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  max-width: 420px;
  margin: auto;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  background: #222;
  color: white;
  font-size: 16px;
  border-radius: 8px;
}

button:hover { background: #000; }

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.hidden { display: none; }
</style>
</head>

<body>

<!-- WELCOME HEADER -->
<div class="header">
  <h1>🍱 Welcome to 3 Meal's Food Cart</h1>
  <p>"Good food, fast service, happy customers."</p>
</div>

<!-- PAGE 1 -->
<div class="page active" id="p1">
  <div class="card">
    <h3>Menu</h3>

    <p>Lumpiang Shanghai Rice - ₱60</p>
    <button onclick="add('Lumpia',60)">Add</button>

    <p>Chicken Pastil Rice - ₱70</p>
    <button onclick="add('Pastil',70)">Add</button>

    <p>Siomai Rice - ₱50</p>
    <button onclick="add('Siomai',50)">Add</button>

    <p>Cart: <span id="cart">Empty</span></p>
    <p>Total: ₱<span id="total">0</span></p>

    <button onclick="go(2)">Next</button>
  </div>
</div>

<!-- PAGE 2 -->
<div class="page" id="p2">
  <div class="card">
    <h3>Customer Info</h3>

    <input id="name" placeholder="Full Name">
    <input id="number" placeholder="Phone Number">

    <select id="method" onchange="toggleDelivery()">
      <option value="">Select Option</option>
      <option value="pickup">Pick Up</option>
      <option value="delivery">Delivery</option>
    </select>

    <div id="deliveryArea" class="hidden">
      <select id="area">
        <option>Road 14 - Bahay Toro</option>
        <option>Road 15 - Bahay Toro</option>
        <option>Road 16 - Bahay Toro</option>
        <option>Road 17 - Bahay Toro</option>
        <option>Road 18 - Bahay Toro</option>
        <option>Road 19 - Bahay Toro</option>
        <option>Road 20 - Bahay Toro</option>
      </select>

      <input id="address" placeholder="Full Address">
    </div>

    <button onclick="go(3)">Next</button>
  </div>
</div>

<!-- PAGE 3 -->
<div class="page" id="p3">
  <div class="card">
    <h3>Payment</h3>

    <button onclick="order('Cash')">Cash</button>
    <button onclick="order('GCash')">GCash</button>

    <div id="gcashBox" class="hidden">
      <p>Scan to Pay</p>
      <img src="gcash.png" width="200"><br><br>
      <input type="file" id="proof">
      <button onclick="confirmGCash()">Confirm Payment</button>
    </div>
  </div>
</div>

<script>
let cart = [];
let total = 0;

function add(item, price){
  cart.push(item);
  total += price;
  document.getElementById("cart").innerText = cart.join(", ");
  document.getElementById("total").innerText = total;
}

function go(page){
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById("p"+page).classList.add("active");
}

function toggleDelivery(){
  let method = document.getElementById("method").value;
  document.getElementById("deliveryArea").classList.toggle("hidden", method !== "delivery");
}

function order(type){
  if(type === "GCash"){
    document.getElementById("gcashBox").classList.remove("hidden");
  } else {
    sendOrder("Cash");
  }
}

function confirmGCash(){
  let file = document.getElementById("proof").files[0];
  if(!file){
    alert("Upload proof!");
    return;
  }
  sendOrder("GCash Paid");
}

function sendOrder(payment){
  let name = document.getElementById("name").value;
  let number = document.getElementById("number").value;
  let method = document.getElementById("method").value;
  let area = document.getElementById("area")?.value || "";
  let address = document.getElementById("address")?.value || "";

  let msg =
  "ORDER\n" +
  "Name: " + name + "\n" +
  "Phone: " + number + "\n" +
  "Type: " + method + "\n" +
  "Area: " + area + "\n" +
  "Address: " + address + "\n" +
  "Items: " + cart.join(", ") + "\n" +
  "Total: ₱" + total + "\n" +
  "Payment: " + payment;

  // Messenger
  let messenger = "https://m.me/SaifHossamLapitan?text=" + encodeURIComponent(msg);
  window.open(messenger, "_blank");

  alert("Order sent!");
}
</script>

</body>
</html>
