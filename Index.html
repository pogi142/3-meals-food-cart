<!DOCTYPE html>
<html>
<head>
  <title>3 Meal's Food Cart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: #ff3c3c;
      color: white;
      text-align: center;
      padding: 15px;
    }

    header img {
      width: 100px;
    }

    .search {
      padding: 10px;
      text-align: center;
    }

    input {
      padding: 10px;
      width: 80%;
      max-width: 300px;
    }

    .menu {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      padding: 10px;
    }

    .item {
      background: white;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
    }

    button {
      background: green;
      color: white;
      border: none;
      padding: 10px;
      margin-top: 5px;
      border-radius: 5px;
    }

    .cart {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: white;
      padding: 10px;
      border-top: 2px solid #ccc;
    }

    .checkout {
      background: orange;
      width: 100%;
    }
  </style>
</head>

<body>

<header>
  <img src="logo.png">
  <h1>3 Meal's Food Cart</h1>
</header>

<div class="search">
  <input type="text" id="search" placeholder="Search food..." onkeyup="searchFood()">
</div>

<div class="menu" id="menu">

  <div class="item">
    <h3>Lumpiang Shanghai</h3>
    <p>₱50</p>
    <button onclick="addToCart('Lumpiang Shanghai',50)">Add</button>
  </div>

  <div class="item">
    <h3>Chicken Pastil Rice</h3>
    <p>₱60</p>
    <button onclick="addToCart('Chicken Pastil Rice',60)">Add</button>
  </div>

  <div class="item">
    <h3>Siomai Rice</h3>
    <p>₱45</p>
    <button onclick="addToCart('Siomai Rice',45)">Add</button>
  </div>

</div>

<div class="cart">
  <h3>Cart: ₱<span id="total">0</span></h3>
  <button class="checkout" onclick="checkout()">Checkout (GCash)</button>
</div>

<script>
let total = 0;

function addToCart(name, price) {
  total += price;
  document.getElementById("total").innerText = total;
}

function checkout() {
  alert("Send payment to GCash: 09525-76659\nTotal: ₱" + total);
}

function searchFood() {
  let input = document.getElementById("search").value.toLowerCase();
  let items = document.getElementsByClassName("item");

  for (let i = 0; i < items.length; i++) {
    let text = items[i].innerText.toLowerCase();
    items[i].style.display = text.includes(input) ? "block" : "none";
  }
}
</script>

</body>
</html>
